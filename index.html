<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Command</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg: #0a0a0a;
    --surface: #161513;
    --surface-2: #1f1d19;
    --gold: #d4af37;
    --gold-dim: #4a3d14;
    --text: #f2ede4;
    --text-dim: #948c7a;
    --border: #2c2922;
    --good: #7a8c5c;
    --bad: #b5503f;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 1.5rem 1.25rem; min-height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .brand { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; }
  .brand span { color: var(--gold); }
  .gear { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; }
  .tabs { display: flex; gap: 4px; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .tab-btn { flex: 1; background: none; border: none; color: var(--text-dim); font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; padding: 10px 4px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .panel { display: none; flex: 1; flex-direction: column; min-height: 0; }
  .panel.active { display: flex; }
  .msgs { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 4px 0 12px; }
  .msg { padding: 10px 12px; border-radius: 6px; font-size: 14px; line-height: 1.45; max-width: 88%; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--gold-dim); border: 1px solid var(--gold); }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
  .msg.agent { align-self: flex-start; background: var(--surface-2); border: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .agent-label { color: var(--gold); font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; display: block; margin-bottom: 4px; }
  .pending-card { background: var(--surface); border: 1px solid var(--gold); border-radius: 6px; padding: 10px 12px; font-size: 13px; margin-top: 4px; }
  .pending-actions { display: flex; gap: 8px; margin-top: 8px; }
  .pending-actions button { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); cursor: pointer; font-size: 13px; }
  .pending-actions .approve { border-color: var(--good); color: var(--good); }
  .pending-actions .reject { border-color: var(--bad); color: var(--bad); }
  .input-row { display: flex; gap: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  textarea { flex: 1; resize: none; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 10px; font-family: 'Inter', sans-serif; font-size: 14px; min-height: 44px; max-height: 100px; }
  .send-btn { background: var(--gold-dim); border: 1px solid var(--gold); color: var(--text); border-radius: 6px; padding: 0 16px; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1px; }
  .empty { color: var(--text-dim); font-size: 13px; text-align: center; padding: 30px 10px; }
  .settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 10; padding: 20px; }
  .settings-overlay.active { display: flex; }
  .settings-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; max-width: 380px; width: 100%; }
  .settings-box h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; margin: 0 0 10px; }
  .settings-box p { font-size: 12px; color: var(--text-dim); margin: 0 0 10px; line-height: 1.4; }
  .settings-box input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 9px; font-size: 13px; margin-bottom: 10px; }
  .settings-box button { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--gold); background: var(--gold-dim); color: var(--text); cursor: pointer; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; font-size: 14px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.ok { background: var(--good); }
  .status-dot.bad { background: var(--bad); }
  @media (min-width: 720px) {
    .wrap { max-width: 720px; padding: 2rem 2.5rem; }
  }
</style>
</head>
<body>
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-box">
    <h3>Backend URL</h3>
    <p>Paste your Railway backend URL (the one ending in .up.railway.app). Saved only on this device.</p>
    <input type="text" id="backend-url-input" placeholder="https://your-app.up.railway.app">
    <button id="backend-url-save">Save</button>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="brand">COMMAND<span>.</span></div>
    <button class="gear" id="open-settings">⚙</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="coach">Coach</button>
    <button class="tab-btn" data-tab="manager">Manager</button>
  </div>

  <div class="panel active" id="panel-coach">
    <div class="msgs" id="coach-msgs"><div class="empty">Tell your coach what you've been doing today.</div></div>
    <div class="input-row">
      <textarea id="coach-input" placeholder="e.g. did legs, leg press 200x8x3"></textarea>
      <button class="send-btn" id="coach-send">Send</button>
    </div>
  </div>

  <div class="panel" id="panel-manager">
    <div class="msgs" id="manager-msgs"><div class="empty">Bring the manager a business idea or task.</div></div>
    <div class="input-row">
      <textarea id="manager-input" placeholder="e.g. is a print-on-demand shirt business worth starting?"></textarea>
      <button class="send-btn" id="manager-send">Send</button>
    </div>
  </div>
</div>

<script>
const BACKEND_KEY = 'command_backend_url';
function getBackend() { return (localStorage.getItem(BACKEND_KEY) || '').replace(/\/$/, ''); }
function setBackend(u) { localStorage.setItem(BACKEND_KEY, u.replace(/\/$/, '')); }

let managerThreadId = null;

function showSettings() {
  document.getElementById('backend-url-input').value = getBackend();
  document.getElementById('settings-overlay').classList.add('active');
}
document.getElementById('open-settings').addEventListener('click', showSettings);
document.getElementById('backend-url-save').addEventListener('click', () => {
  const v = document.getElementById('backend-url-input').value.trim();
  if (!v) return;
  setBackend(v);
  document.getElementById('settings-overlay').classList.remove('active');
});

if (!getBackend()) showSettings();

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.getAttribute('data-tab')).classList.add('active');
  });
});

function addMsg(container, role, text) {
  const empty = container.querySelector('.empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'assistant');
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function addPendingCard(container, pendingList) {
  pendingList.forEach(id => {
    const card = document.createElement('div');
    card.className = 'pending-card';
    card.innerHTML = 'Waiting on your confirmation to log this.' +
      '<div class="pending-actions">' +
      '<button class="approve" data-approve="' + id + '">Confirm</button>' +
      '<button class="reject" data-reject="' + id + '">Skip</button>' +
      '</div>';
    container.appendChild(card);
    container.scrollTop = container.scrollHeight;
  });
  container.querySelectorAll('[data-approve]').forEach(btn => btn.addEventListener('click', () => confirmPending(btn, true)));
  container.querySelectorAll('[data-reject]').forEach(btn => btn.addEventListener('click', () => confirmPending(btn, false)));
}

async function confirmPending(btn, approve) {
  const id = btn.getAttribute('data-approve') || btn.getAttribute('data-reject');
  const backend = getBackend();
  const card = btn.closest('.pending-card');
  card.innerHTML = approve ? 'Logged.' : 'Skipped.';
  try {
    await fetch(backend + '/api/coach/confirm', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ id: Number(id), approve })
    });
  } catch (e) {
    card.innerHTML = 'Could not reach the server.';
  }
}

document.getElementById('coach-send').addEventListener('click', async () => {
  const backend = getBackend();
  if (!backend) { showSettings(); return; }
  const ta = document.getElementById('coach-input');
  const text = ta.value.trim();
  if (!text) return;
  const container = document.getElementById('coach-msgs');
  addMsg(container, 'user', text);
  ta.value = '';
  const thinking = addMsg(container, 'assistant', 'Thinking...');
  try {
    const res = await fetch(backend + '/api/coach/message', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    thinking.textContent = data.reply || data.error || 'No response.';
    if (data.pending && data.pending.length) addPendingCard(container, data.pending);
  } catch (e) {
    thinking.textContent = 'Could not reach the backend. Check the URL in settings.';
  }
});

document.getElementById('manager-send').addEventListener('click', async () => {
  const backend = getBackend();
  if (!backend) { showSettings(); return; }
  const ta = document.getElementById('manager-input');
  const text = ta.value.trim();
  if (!text) return;
  const container = document.getElementById('manager-msgs');
  addMsg(container, 'user', text);
  ta.value = '';
  const thinking = addMsg(container, 'assistant', 'Delegating to the team...');
  try {
    const res = await fetch(backend + '/api/manager/message', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ message: text, threadId: managerThreadId })
    });
    const data = await res.json();
    if (data.error) { thinking.textContent = data.error; return; }
    managerThreadId = data.threadId;
    thinking.textContent = data.plan || '';
    (data.results || []).forEach(r => {
      const div = document.createElement('div');
      div.className = 'msg agent';
      div.innerHTML = '<span class="agent-label">' + r.specialist.toUpperCase().replace('_', ' ') + '</span>' + r.answer;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  } catch (e) {
    thinking.textContent = 'Could not reach the backend. Check the URL in settings.';
  }
});

[document.getElementById('coach-input'), document.getElementById('manager-input')].forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const btnId = el.id === 'coach-input' ? 'coach-send' : 'manager-send';
      document.getElementById(btnId).click();
    }
  });
});
</script>
</body>
</html>
